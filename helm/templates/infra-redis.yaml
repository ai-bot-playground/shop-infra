{{- if .Values.infra.enabled }}
{{- $redis := .Values.infra.redis }}
---
# Flash-sale stock counters: appendonly + noeviction (never evict a counter).
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-conf
  labels:
    app: redis
data:
  redis.conf: |
    appendonly yes
    maxmemory 256mb
    maxmemory-policy noeviction
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: {{ $redis.image }}
          command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: conf
              mountPath: /usr/local/etc/redis
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              memory: "320Mi"
      volumes:
        - name: conf
          configMap:
            name: redis-conf
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
{{- end }}
