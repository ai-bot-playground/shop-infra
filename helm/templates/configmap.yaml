{{- range $name, $svc := .Values.services }}
{{- if eq $svc.type "spring" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config
  labels:
    app: {{ $name }}
data:
  SPRING_PROFILES_ACTIVE: {{ $.Values.springProfile | quote }}
  {{- range $k, $v := $svc.env }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
{{- end }}
{{- end }}
