{{- if .Values.infra.enabled }}
{{- $pg := .Values.infra.postgres }}
---
# database-per-service bootstrap, mounted into /docker-entrypoint-initdb.d.
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  labels:
    app: postgres
data:
  01-create-databases.sql: |
    CREATE DATABASE catalog_db;
    CREATE DATABASE inventory_db;
    CREATE DATABASE order_db;
    CREATE DATABASE payment_db;
    CREATE DATABASE notification_db;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: {{ $pg.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: {{ $pg.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ $pg.password | quote }}
            - name: POSTGRES_DB
              value: {{ $pg.db | quote }}
            # initdb scripts only run on an empty data dir; keep PGDATA in a
            # subdir so the emptyDir mount root never looks "non-empty".
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ $pg.user | quote }}, "-d", {{ $pg.db | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ $pg.user | quote }}, "-d", {{ $pg.db | quote }}]
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "512Mi"
      volumes:
        - name: initdb
          configMap:
            name: postgres-initdb
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
{{- end }}
